name: Deploy iFlow to SAP CPI

on:
  push:
    branches:
      - main # जेव्हा तुम्ही main ब्रांचवर बदल पुश कराल तेव्हा हा जॉब ऑटोमॅटिक सुरू होईल
  workflow_dispatch: # मॅन्युअली रन करण्याचा पर्याय

permissions:
  contents: read

jobs:
  cpi-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Git मधील कोड चेकआऊट करणे
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Python सेट करणे
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # 3. 'requests' लायब्ररी इन्स्टॉल करणे
    - name: Install Dependencies
      run: pip install requests

    # 4. SAP CPI मध्ये iFlow अपलोड आणि डिप्लॉय करणे
    - name: Upload and Deploy Artifact
      env:
        BTP_CLIENT_ID: ${{ secrets.BTP_CLIENT_ID }}
        BTP_CLIENT_SECRET: ${{ secrets.BTP_CLIENT_SECRET }}
        BTP_TOKEN_URL: ${{ secrets.BTP_TOKEN_URL }}
        BTP_API_URL: ${{ secrets.BTP_API_URL }}
      shell: python
      run: |
        import os
        import requests
        import base64
        from requests.auth import HTTPBasicAuth

        client_id = os.environ['BTP_CLIENT_ID']
        client_secret = os.environ['BTP_CLIENT_SECRET']
        token_url = os.environ['BTP_TOKEN_URL']
        host_url = os.environ['BTP_API_URL'].rstrip('/')

        # >>> तुमचे कॉन्फिगरेशन इथे बदला <<<
        iflow_id = "HelloWorld"
        package_id = "DevOps_Demo"  # तुमच्या CPI Package चा Technical ID इथे टाका
        file_path = f"backup/artifacts/{iflow_id}.zip"

        if not os.path.exists(file_path):
            print(f"Error: {file_path} फाईल सापडली नाही!")
            exit(1)

        print("1. Fetching OAuth Token...")
        token_response = requests.post(token_url, data={'grant_type': 'client_credentials'}, auth=HTTPBasicAuth(client_id, client_secret))
        token_response.raise_for_status()
        access_token = token_response.json()['access_token']
        
        headers_json = {
            'Authorization': f'Bearer {access_token}',
            'Accept': 'application/json',
            'Content-Type': 'application/json'
        }

        # ---- STEP A: जुना iFlow आधीपासून अस्तित्वात आहे का ते तपासणे आणि डिलीट करणे ----
        print(f"2. Checking if '{iflow_id}' exists in Designtime...")
        check_url = f"{host_url}/api/v1/IntegrationDesigntimeArtifacts(Id='{iflow_id}',Version='active')"
        check_res = requests.get(check_url, headers={'Authorization': f'Bearer {access_token}', 'Accept': 'application/json'})
        
        if check_res.status_code == 200:
            print(f"Existing artifact found. Deleting '{iflow_id}' to clear conflicts...")
            delete_res = requests.delete(check_url, headers={'Authorization': f'Bearer {access_token}', 'Accept': 'application/json'})
            if delete_res.status_code not in [200, 202, 204]:
                print(f"Warning: Delete status {delete_res.status_code}, trying to proceed anyway.")
        else:
            print("No existing artifact found. Ready for a clean upload.")

        # ---- STEP B: ZIP फाईल Base64 मध्ये कन्व्हर्ट करून JSON द्वारे अपलोड करणे ----
        print(f"3. Uploading fresh iFlow JSON to Package '{package_id}'...")
        upload_url = f"{host_url}/api/v1/IntegrationPackages('{package_id}')/IntegrationDesigntimeArtifacts"
        
        with open(file_path, 'rb') as f:
            zip_binary = f.read()
            # फाईलचा डेटा Base64 स्ट्रिंगमध्ये बदलणे
            base64_encoded_file = base64.b64encode(zip_binary).decode('utf-8')

        # SAP CPI ला आवश्यक असणारा अधिकृत OData JSON पेलोड (Payload)
        payload = {
            "Id": HelloWorld,
            "Name": HelloWorld,
            "PackageId": DevOps_Demo,
            "Version": "1.0.0",
            "XValue": base64_encoded_file
        }
        
        upload_response = requests.post(upload_url, headers=headers_json, json=payload)
        
        if upload_response.status_code in [200, 201]:
            print("Successfully uploaded artifact to CPI Designtime!")
        else:
            print(f"Upload failed: {upload_response.status_code} - {upload_response.text}")
            exit(1)

        # ---- STEP C: iFlow Runtime वर डिप्लॉय करणे ----
        print("4. Triggering Deployment to Runtime...")
        deploy_url = f"{host_url}/api/v1/DeployIntegrationDesigntimeArtifact?Id='{iflow_id}'&Version='active'"
        deploy_response = requests.post(deploy_url, headers={'Authorization': f'Bearer {access_token}', 'Accept': 'application/json'})
        
        if deploy_response.status_code in [200, 201, 202]:
            print(f"Success! iFlow '{iflow_id}' deployment triggered successfully.")
        else:
            print(f"Deployment failed: {deploy_response.status_code} - {deploy_response.text}")
            exit(1)