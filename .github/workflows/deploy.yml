name: Deploy iFlow to SAP CPI

on:
  push:
    branches:
      - main # जेव्हा तुम्ही main ब्रांचवर बदल पुश कराल तेव्हा हा जॉब ऑटोमॅटिक सुरू होईल
  workflow_dispatch: # मॅन्युअली रन करण्याचा पर्याय

permissions:
  contents: read

jobs:
  cpi-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Git मधील कोड चेकआऊट करणे
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Python सेट करणे
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # 3. 'requests' लायब्ररी इन्स्टॉल करणे
    - name: Install Dependencies
      run: pip install requests

    # 4. SAP CPI मध्ये iFlow अपलोड आणि डिप्लॉय करणे
    - name: Upload and Deploy Artifact
      env:
        BTP_CLIENT_ID: ${{ secrets.BTP_CLIENT_ID }}
        BTP_CLIENT_SECRET: ${{ secrets.BTP_CLIENT_SECRET }}
        BTP_TOKEN_URL: ${{ secrets.BTP_TOKEN_URL }}
        BTP_API_URL: ${{ secrets.BTP_API_URL }}
      shell: python
      run: |
        import os
        import requests
        from requests.auth import HTTPBasicAuth

        client_id = os.environ['BTP_CLIENT_ID']
        client_secret = os.environ['BTP_CLIENT_SECRET']
        token_url = os.environ['BTP_TOKEN_URL']
        host_url = os.environ['BTP_API_URL'].rstrip('/')

        # कॉन्फिगरेशन
        iflow_id = "HelloWorld"
        package_id = "DevOps_Demo"  
        file_path = f"backup/artifacts/{iflow_id}.zip"

        if not os.path.exists(file_path):
            print(f"Error: {file_path} फाईल सापडली नाही!")
            exit(1)

        print("1. Fetching OAuth Token...")
        token_response = requests.post(token_url, data={'grant_type': 'client_credentials'}, auth=HTTPBasicAuth(client_id, client_secret))
        token_response.raise_for_status()
        access_token = token_response.json()['access_token']
        
        headers_base = {
            'Authorization': f'Bearer {access_token}',
            'Accept': 'application/json'
        }

        # ---- STEP A: जुना iFlow डिलीट करणे ----
        print(f"2. Checking and Deleting existing '{iflow_id}'...")
        check_url = f"{host_url}/api/v1/IntegrationDesigntimeArtifacts(Id='{iflow_id}',Version='active')"
        check_res = requests.get(check_url, headers=headers_base)
        
        if check_res.status_code == 200:
            print(f"Artifact found. Deleting '{iflow_id}' to clear space...")
            delete_res = requests.delete(check_url, headers=headers_base)
            if delete_res.status_code in [200, 202, 204]:
                print("Successfully deleted the old artifact.")
            else:
                print(f"Delete failed: {delete_res.status_code} - {delete_res.text}")
                exit(1)
        else:
            print("No old artifact found. Ready for clean creation.")

        # ---- STEP B: नवीन iFlow कंटेनर तयार करणे (Version शिवाय) ----
        print(f"3. Creating fresh iFlow container in Package '{package_id}'...")
        upload_url = f"{host_url}/api/v1/IntegrationPackages('{package_id}')/IntegrationDesigntimeArtifacts"
        
        with open(file_path, 'rb') as f:
            zip_binary = f.read()

        # एरर घालवण्यासाठी इथून 'Version' काढून टाकले आहे
        create_payload = {
            "Id": iflow_id,
            "Name": iflow_id,
            "PackageId": package_id
        }
        
        create_headers = {
            'Authorization': f'Bearer {access_token}',
            'Accept': 'application/json',
            'Content-Type': 'application/json'
        }
        create_res = requests.post(upload_url, headers=create_headers, json=create_payload)
        
        if create_res.status_code in [200, 201]:
            print("Container created successfully! Now injecting ZIP content...")
            # नवीन कंटेनरमध्ये ZIP डेटा पुश करणे
            update_value_url = f"{host_url}/api/v1/IntegrationDesigntimeArtifacts(Id='{iflow_id}',Version='active')/$value"
            upload_response = requests.put(update_value_url, headers={'Authorization': f'Bearer {access_token}'}, data=zip_binary)
            
            if upload_response.status_code not in [200, 201, 204]:
                print(f"Failed to inject ZIP data: {upload_response.status_code} - {upload_response.text}")
                exit(1)
            print("Successfully uploaded artifact data!")
        else:
            print(f"Failed to create fresh container: {create_res.status_code} - {create_res.text}")
            exit(1)

        # ---- STEP C: iFlow Runtime वर डिप्लॉय करणे ----
        print("4. Triggering Deployment to Runtime...")
        deploy_url = f"{host_url}/api/v1/DeployIntegrationDesigntimeArtifact?Id='{iflow_id}'&Version='active'"
        deploy_response = requests.post(deploy_url, headers=headers_base)
        
        if deploy_response.status_code in [200, 201, 202]:
            print(f"🚀 Success! iFlow '{iflow_id}' deployment triggered successfully.")
        else:
            print(f"Deployment failed: {deploy_response.status_code} - {deploy_response.text}")
            exit(1)