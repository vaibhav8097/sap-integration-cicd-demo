name: Deploy iFlow to SAP CPI

on:
  push:
    branches:
      - main # जेव्हा तुम्ही main ब्रांचवर बदल पुश कराल तेव्हा हा जॉब ऑटोमॅटिक सुरू होईल
  workflow_dispatch: # मॅन्युअली रन करण्याचा पर्याय

permissions:
  contents: read

jobs:
  cpi-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Git मधील कोड चेकआऊट करणे
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Python सेट करणे
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # 3. 'requests' लायब्ररी इन्स्टॉल करणे
    - name: Install Dependencies
      run: pip install requests

    # 4. SAP CPI मध्ये iFlow अपलोड आणि डिप्लॉय करणे
    - name: Upload and Deploy Artifact
      env:
        BTP_CLIENT_ID: ${{ secrets.BTP_CLIENT_ID }}
        BTP_CLIENT_SECRET: ${{ secrets.BTP_CLIENT_SECRET }}
        BTP_TOKEN_URL: ${{ secrets.BTP_TOKEN_URL }}
        BTP_API_URL: ${{ secrets.BTP_API_URL }}
      shell: python
  run: |
        import os
        import requests
        from requests.auth import HTTPBasicAuth

        client_id = os.environ['BTP_CLIENT_ID']
        client_secret = os.environ['BTP_CLIENT_SECRET']
        token_url = os.environ['BTP_TOKEN_URL']
        host_url = os.environ['BTP_API_URL'].rstrip('/')

        iflow_id = "HelloWorld"
        # तुमच्या पॅकेजचा आयडी इथे टाका (उदा. "MyIntegrationPackage")
        package_id = "YOUR_PACKAGE_ID_HERE" 
        file_path = f"backup/artifacts/{iflow_id}.zip"

        print("1. Fetching OAuth Token...")
        token_response = requests.post(token_url, data={'grant_type': 'client_credentials'}, auth=HTTPBasicAuth(client_id, client_secret))
        token_response.raise_for_status()
        access_token = token_response.json()['access_token']
        
        headers_json = {'Authorization': f'Bearer {access_token}', 'Accept': 'application/json'}

        # ---- STEP A: जुना iFlow डिलीट करणे (जेणेकरून 501/Conflict एरर येणार नाही) ----
        print(f"2. Checking if {iflow_id} exists to delete...")
        check_url = f"{host_url}/api/v1/IntegrationDesigntimeArtifacts(Id='{iflow_id}',Version='active')"
        check_res = requests.get(check_url, headers=headers_json)
        
        if check_res.status_code == 200:
            print(f"Existing artifact found. Deleting {iflow_id} before fresh upload...")
            delete_res = requests.delete(check_url, headers=headers_json)
            if delete_res.status_code not in [200, 202, 204]:
                print(f"Warning: Delete failed but trying to proceed: {delete_res.text}")
        else:
            print("No existing artifact found. Proceeding to create new.")

        # ---- STEP B: नवीन iFlow ZIP अपलोड करणे ----
        print(f"3. Uploading fresh iFlow {iflow_id} to Package {package_id}...")
        upload_url = f"{host_url}/api/v1/IntegrationPackages('{package_id}')/IntegrationDesigntimeArtifacts"
        
        with open(file_path, 'rb') as f:
            zip_data = f.read()

        # Multipart form-data तयार करणे कारण CPI चे API फाईल अपलोडसाठी हे फॉरमॅट स्वीकारतात
        files = {'file': (f"{iflow_id}.zip", zip_data, 'application/zip')}
        
        # फॉर्म अपलोडसाठी फक्त Authorization हेडर लागेल, Accept JSON सोबत
        upload_headers = {'Authorization': f'Bearer {access_token}', 'Accept': 'application/json'}
        
        upload_response = requests.post(upload_url, headers=upload_headers, files=files)
        
        if upload_response.status_code in [200, 201]:
            print("Successfully uploaded artifact to CPI Designtime!")
        else:
            print(f"Upload failed: {upload_response.status_code} - {upload_response.text}")
            exit(1)

        # ---- STEP C: iFlow Runtime वर डिप्लॉय करणे ----
        print("4. Triggering Deployment to Runtime...")
        deploy_url = f"{host_url}/api/v1/DeployIntegrationDesigntimeArtifact?Id='{iflow_id}'&Version='active'"
        
        deploy_response = requests.post(deploy_url, headers=headers_json)
        
        if deploy_response.status_code in [200, 201, 202]:
            print(f"Success! iFlow '{iflow_id}' deployment triggered successfully.")
        else:
            print(f"Deployment failed: {deploy_response.status_code} - {deploy_response.text}")
            exit(1)