name: SAP CPI Daily Backup Only

on:
  schedule:
    - cron: '0 0 * * *' # रोज रात्री १२ वाजता (UTC) रन होईल
  workflow_dispatch: # मॅन्युअली रन करण्याचा पर्याय

# >>> हा खालील परमिशन ब्लॉक ॲड करा <<<
permissions:
  contents: write

jobs:
  cpi-backup:
    runs-on: ubuntu-latest

    steps:
    # 1. Git Repository चेकआऊट करणे
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Python सेट करणे
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # 3. API कॉलसाठी लागणारे 'requests' पॅकेज इन्स्टॉल करणे
    - name: Install Dependencies
      run: pip install requests

    # 4. SAP CPI मधून iFlows डाऊनलोड करण्याचा स्क्रिप्ट कोड
    - name: Download CPI Artifacts
      env:
        BTP_CLIENT_ID: ${{ secrets.BTP_CLIENT_ID }}
        BTP_CLIENT_SECRET: ${{ secrets.BTP_CLIENT_SECRET }}
        BTP_TOKEN_URL: ${{ secrets.BTP_TOKEN_URL }}
        BTP_API_URL: ${{ secrets.BTP_API_URL }}
      shell: python
      run: |
        import os
        import requests
        from requests.auth import HTTPBasicAuth

        # एन्व्हायर्नमेंट व्हेरिएबल्स मिळवणे
        client_id = os.environ['BTP_CLIENT_ID']
        client_secret = os.environ['BTP_CLIENT_SECRET']
        token_url = os.environ['BTP_TOKEN_URL']
        host_url = os.environ['BTP_API_URL'].rstrip('/')

        # फोल्डर तयार करणे
        os.makedirs('backup/artifacts', exist_ok=True)

        print("1. Fetching OAuth Token...")
        # SAP CPI कडून टोकन मिळवणे
        token_response = requests.post(token_url, data={'grant_type': 'client_credentials'}, auth=HTTPBasicAuth(client_id, client_secret))
        token_response.raise_for_status()
        access_token = token_response.json()['access_token']
        headers = {'Authorization': f'Bearer {access_token}', 'Accept': 'application/json'}

        print("2. Fetching all Integration Packages...")
        # सर्व पॅकेजेसची लिस्ट मिळवणे
        packages_url = f"{host_url}/api/v1/IntegrationPackages"
        pkg_response = requests.get(packages_url, headers=headers)
        pkg_response.raise_for_status()
        packages = pkg_response.json().get('d', {}).get('results', [])

        print(f"Found {len(packages)} packages. Fetching iFlows...")
        # प्रत्येक पॅकेजमधील iFlows डाऊनलोड करणे
        for pkg in packages:
            pkg_id = pkg['Id']
            artifacts_url = f"{host_url}/api/v1/IntegrationPackages('{pkg_id}')/IntegrationDesigntimeArtifacts"
            art_response = requests.get(artifacts_url, headers=headers)
            
            if art_response.status_code == 200:
                artifacts = art_response.json().get('d', {}).get('results', [])
                for art in artifacts:
                    art_id = art['Id']
                    print(f"Downloading Artifact: {art_id} from Package: {pkg_id}")
                    
                    # iFlow ची ZIP फाईल डाऊनロード करणे
                    download_url = f"{host_url}/api/v1/IntegrationDesigntimeArtifacts(Id='{art_id}',Version='active')/$value"
                    file_response = requests.get(download_url, headers={'Authorization': f'Bearer {access_token}'})
                    
                    if file_response.status_code == 200:
                        with open(f"backup/artifacts/{art_id}.zip", 'wb') as f:
                            f.write(file_response.content)
                            
        print("Backup downloaded successfully.")

    # 5. डाऊनलोड झालेल्या फाईल्स GitHub वर सेव्ह (Push) करणे
    - name: Commit and Push to Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add backup/artifacts/
        git diff-index --quiet HEAD || git commit -m "Automated CPI Backup - $(date +'%Y-%m-%d')"
        git push